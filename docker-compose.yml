services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:80"
    environment:
      PORT: 80
    volumes:
      - site-data:/app/data
    depends_on:
      - cms-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3

  cms-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      API_PORT: 3000
      DATA_ROOT: /app/data
      CMS_API_KEY: ${CMS_API_KEY:-dev-local-key}
      STORAGE_BACKEND: fs
      PREVIEW_HOST: preview.localhost
      PREVIEW_BASE_URL: http://preview.localhost:8081
      DRAFTS_DIR: .drafts
      COMPONENTS_DIR: .components
    volumes:
      - site-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  editor-router:
    image: caddy:2-alpine
    ports:
      - "8081:8081"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - cms-api
      - openwebui

  openwebui:
    build:
      context: .
      dockerfile: Dockerfile.openwebui
    env_file: .env
    environment:
      OPENAI_API_BASE_URL: https://openrouter.ai/api/v1
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
      ENABLE_OPENAI_API: "true"
      ENABLE_SIGNUP: "true"
      DEFAULT_MODELS: minimax/minimax-m3
      DEFAULT_MODEL_PARAMS: '{"function_calling":"native"}'
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-dev-secret-change-me}
      WEBUI_URL: http://localhost:8081
      TOOL_SERVER_CONNECTIONS: '[{"type":"mcp","url":"http://cms-api:3000/mcp","path":"/mcp","auth_type":"bearer","key":"${CMS_API_KEY}","config":{"enable":true},"info":{"id":"cms-pages","name":"CMS Pages","description":"Read and write HTML files on the site"}}]'
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - cms-api

volumes:
  site-data:
  openwebui-data:
