server {
    listen ${PORT};
    server_name _;

    root /app/data;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/xml;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Try to serve file, then directory, then with .html extension
    location / {
        try_files $uri $uri/ @extensionless;
    }

    location @extensionless {
        rewrite ^(.*)$ $1.html last;
    }
}
