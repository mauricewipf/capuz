services:
  - type: web
    name: capuz
    runtime: docker
    dockerfilePath: ./Dockerfile.stack
    numInstances: 1
    region: frankfurt
    plan: starter
    healthCheckPath: /
    autoDeployTrigger: commit
    branch: main
    envVars:
      - key: APP_NAME
        value: Capuzzella CMS
      - key: OPENAI_API_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ENABLE_OPENAI_API
        value: "true"
      - key: DEFAULT_MODELS
        value: minimax/minimax-m3
      - key: DEFAULT_MODEL_PARAMS
        value: '{"function_calling":"native"}'
      - key: CMS_API_KEY
        generateValue: true
      - key: WEBUI_SECRET_KEY
        generateValue: true
      - key: WEBUI_URL
        value: https://editor.example.com
      - key: EDITOR_HOST
        value: editor.example.com
      - key: PREVIEW_HOST
        value: preview.example.com
      - key: PREVIEW_BASE_URL
        value: https://preview.example.com
      - key: ENABLE_SIGNUP
        value: "false"
      - key: DATA_DIR
        value: /app/data/.open-webui
      - key: DATA_ROOT
        value: /app/data
      - key: STORAGE_BACKEND
        value: fs
      - key: DRAFTS_DIR
        value: .drafts
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
